<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HOT 日报 · 每日 AI 资讯</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.12);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.2);
    --card-bg: rgba(255,255,255,0.18);
    --card-border: rgba(255,255,255,0.3);
    --text-main: #1a1a2e;
    --text-sub: rgba(255,255,255,0.75);
    --text-card: #1e293b;
    --text-card-sub: #64748b;
    --chip-bg: rgba(255,255,255,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    /* 不在 body 上设置背景，改为固定层，避免内容高度变化时出现视觉跳变 */
    background: transparent;
  }
  /* 固定背景层：完全独立于内容滚动和高度变化 */
  #sky-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    transition: background 2s ease;
    background: #0a0a2e;
  }
  .stars { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  body.night .stars { display: block; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }
  .moon { display: none; position: fixed; z-index: 0; pointer-events: none; }
  body.night .moon { display: block; }
  .moon svg { width: 70px; height: 70px; overflow: visible; }
  .clouds { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 180px; pointer-events: none; z-index: 0; overflow: hidden; }
  body.day .clouds { display: block; }
  .cloud-cluster {
    position: absolute;
    animation: cloudDrift linear infinite;
    opacity: 0.85;
  }
  .cloud-bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95), rgba(240,245,250,0.75) 60%, rgba(220,230,240,0.5));
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }
  @keyframes cloudDrift {
    from { transform: translateX(-300px); }
    to { transform: translateX(calc(100vw + 300px)); }
  }
  .container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto; padding: 24px 16px 80px;
  }
  .hero { text-align: center; padding: 48px 20px 36px; color: white; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 30px;
    padding: 6px 16px; font-size: 13px; color: rgba(255,255,255,0.9);
    margin-bottom: 20px; letter-spacing: 0.5px;
  }
  .hero h1 {
    font-size: clamp(28px, 6vw, 48px); font-weight: 700; color: white;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2); line-height: 1.2; margin-bottom: 8px;
  }
  .hero-date { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 4px; }
  .hero-freshness { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }
  .hero-greeting {
    font-size: 17px; color: rgba(255,255,255,0.9); margin-bottom: 32px;
    line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto;
  }
  .hero-stats { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
  .stat-pill {
    background: rgba(255,255,255,0.22); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.35); border-radius: 50px;
    padding: 10px 20px; display: flex; flex-direction: column;
    align-items: center; min-width: 90px;
    transition: transform 0.2s, background 0.2s;
  }
  .stat-pill:hover { transform: translateY(-2px); background: rgba(255,255,255,0.3); }
  .stat-num { font-size: 22px; font-weight: 700; color: white; line-height: 1; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 3px; white-space: nowrap; }
  .nav-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 16px 32px; }
  .nav-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 30px;
    padding: 7px 14px; font-size: 13px; color: white;
    text-decoration: none; transition: all 0.2s; cursor: pointer;
  }
  .nav-chip:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }
  .nav-chip .count-badge { background: rgba(255,255,255,0.3); border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
  .section-header { display: flex; align-items: center; gap: 10px; margin: 40px 0 18px; color: white; }
  .section-icon { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .section-title { font-size: 20px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
  .section-count { background: rgba(255,255,255,0.25); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 600; }
  .section-divider { flex: 1; height: 1px; background: rgba(255,255,255,0.2); }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
    border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.5);
    padding: 20px; box-shadow: var(--shadow);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    opacity: 0; transform: translateY(24px); will-change: transform, opacity;
  }
  .card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1); }
  .card:hover { transform: translateY(-4px) !important; box-shadow: var(--shadow-hover); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .card-num {
    flex-shrink: 0; width: 28px; height: 28px;
    background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white;
  }
  .card-source-chip {
    display: inline-flex; align-items: center; background: #f1f5f9;
    border-radius: 20px; padding: 3px 9px; font-size: 11px;
    color: #64748b; max-width: 160px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
  }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text-card); line-height: 1.5; margin-bottom: 8px; }
  .card-time { font-size: 11px; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
  .card-summary {
    font-size: 13px; color: var(--text-card-sub); line-height: 1.6; margin-bottom: 14px;
    transition: all 0.4s ease;
  }
  .card-summary.clamped {
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-summary.unclamped {
    display: block; -webkit-line-clamp: unset;
  }
  .card-footer { display: flex; justify-content: flex-end; }
  .card-link {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 500; text-decoration: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .card-link:hover { opacity: 0.9; transform: scale(1.04); }
  .card-x-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1.5px solid #667eea60;
    color: #667eea; border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .card-x-toggle:hover {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border-color: transparent;
    transform: scale(1.04);
  }
  .card.relevant { border-left: 3px solid #667eea; }
  .relevant-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #667eea20, #764ba220);
    border: 1px solid #667eea40; border-radius: 20px;
    padding: 2px 9px; font-size: 11px; color: #667eea; font-weight: 600; margin-bottom: 8px;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.2); border-top-color: white;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.7); }
  .error-state .error-icon { font-size: 38px; margin-bottom: 12px; }
  .retry-btn {
    display: inline-block; margin-top: 14px;
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 8px 20px; color: white; font-size: 13px;
    cursor: pointer; text-decoration: none;
  }
  .retry-btn:hover { background: rgba(255,255,255,0.35); }
  .footer { text-align: center; padding: 32px 16px 16px; color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.8; }
  .footer a { color: rgba(255,255,255,0.8); text-decoration: underline; }
  .empty-section { background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.3); border-radius: var(--radius); padding: 24px; text-align: center; color: rgba(255,255,255,0.5); font-size: 13px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

  /* ===== V3 新增：浏览层（无链接卡片） ===== */
  .browse-list { display: flex; flex-direction: column; gap: 8px; }
  .browse-item {
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .browse-item.visible { opacity: 1; transform: translateY(0); }
  .browse-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .browse-num {
    width: 20px; height: 20px; flex-shrink: 0;
    background: #e2e8f0; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #64748b;
  }
  .browse-section-tag { font-size: 10px; color: #94a3b8; white-space: nowrap; }
  .browse-title { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.5; margin-bottom: 2px; }
  .browse-teaser { font-size: 12px; color: #64748b; line-height: 1.5; }
  .browse-item:hover { background: rgba(255,255,255,0.95); }

  /* ===== V3 新增：存档层（折叠后用渐变遮罩，展开后用大间隔） ===== */
  .tier-3-wrapper {
    position: relative;
    transition: max-height 0.6s ease;
  }
  .tier-3-wrapper.collapsed {
    max-height: 320px;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 35%, transparent 55%);
    mask-image: linear-gradient(to bottom, black 0%, black 35%, transparent 55%);
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
  }
  .tier-3-wrapper.expanded {
    max-height: none;
    -webkit-mask-image: none;
    mask-image: none;
    overflow: visible;
  }
  .tier-3-wrapper .tier3-card {
    background: rgba(255,255,255,0.85);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    opacity: 0; transform: translateY(24px);
    will-change: transform, opacity;
    margin-bottom: 8px;
  }
  .tier-3-wrapper.expanded .tier3-card {
    margin-bottom: 680px;
  }
  .tier-3-wrapper.expanded .tier3-card:last-child {
    margin-bottom: 8px;
  }
  .tier3-card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1); }
  .tier3-card:hover { transform: translateY(-3px) !important; }
  .tier3-card .card-title { color: #1e293b; }
  .tier3-card .card-summary { color: #64748b; }
  .tier3-card .card-source-chip { background: #f1f5f9; color: #64748b; }
  .tier3-card .card-num { background: #e2e8f0; color: #94a3b8; }

  /* 展开/收起按钮 */
  .tier-3-expand-bar {
    display: flex; justify-content: center; margin: 12px 0 24px;
  }
  .tier-3-expand-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px; padding: 10px 24px; font-size: 13px;
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .tier-3-expand-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.03); }
  .tier-3-expand-btn .arrow { display: inline-block; transition: transform 0.3s; }
  .tier-3-expand-btn.expanded .arrow { transform: rotate(180deg); }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .hero { padding: 32px 16px 24px; }
    .stat-pill { min-width: 70px; padding: 8px 12px; }
    .stat-num { font-size: 18px; }
    .moon svg { width: 52px; height: 52px; }
    .moon { top: 90px !important; right: 12px !important; }
  }
</style>
</head>
<body>
<div id="sky-bg"></div>

<div class="stars" id="starsContainer"></div>

<div class="moon" id="moonEl">
  <svg id="moonSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="moonFace" cx="35%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#fffef8"/>
        <stop offset="40%" stop-color="#f5ecd7"/>
        <stop offset="75%" stop-color="#e8dcc8"/>
        <stop offset="100%" stop-color="#d4c4a8"/>
      </radialGradient>
      <radialGradient id="moonDarkGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(10,10,46,0.82)"/>
        <stop offset="60%" stop-color="rgba(15,33,62,0.88)"/>
        <stop offset="100%" stop-color="rgba(22,33,62,0.92)"/>
      </radialGradient>
      <filter id="litGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <clipPath id="litClip">
        <path id="moonLitClipPath" d=""/>
      </clipPath>
    </defs>
    <path id="moonLitPath" fill="url(#moonFace)" filter="url(#litGlow)"/>
    <g clip-path="url(#litClip)" opacity="0.35" style="pointer-events:none;">
      <ellipse cx="32" cy="38" rx="10" ry="8" fill="#c4b49a" opacity="0.6"/>
      <ellipse cx="32" cy="38" rx="7" ry="5" fill="#b0a084" opacity="0.4"/>
      <ellipse cx="58" cy="28" rx="7" ry="6" fill="#c4b49a" opacity="0.5"/>
      <ellipse cx="58" cy="28" rx="4" ry="3" fill="#b0a084" opacity="0.3"/>
      <ellipse cx="65" cy="55" rx="8" ry="7" fill="#c4b49a" opacity="0.55"/>
      <ellipse cx="65" cy="55" rx="5" ry="4" fill="#b0a084" opacity="0.35"/>
      <ellipse cx="28" cy="62" rx="5" ry="4" fill="#c4b49a" opacity="0.5"/>
      <ellipse cx="45" cy="72" rx="6" ry="5" fill="#c4b49a" opacity="0.45"/>
      <ellipse cx="72" cy="40" rx="4" ry="3.5" fill="#c4b49a" opacity="0.4"/>
      <ellipse cx="38" cy="50" rx="3" ry="2.5" fill="#c4b49a" opacity="0.35"/>
      <ellipse cx="42" cy="45" rx="18" ry="14" fill="#c8b89e" opacity="0.15"/>
      <ellipse cx="60" cy="58" rx="14" ry="10" fill="#c8b89e" opacity="0.12"/>
    </g>
  </svg>
</div>

<div class="clouds" id="cloudsContainer"></div>

<div class="container">
  <div class="hero">
    <div class="hero-badge">
      <span id="timeIcon">☀️</span>
      <span id="timePeriodLabel">加载中...</span>
      &nbsp;·&nbsp; AI HOT 日报
    </div>
    <h1>今日 AI 资讯速览</h1>
    <div class="hero-date" id="heroDate">—</div>
    <div class="hero-freshness" id="heroFreshness"></div>
    <div class="hero-greeting" id="heroGreeting"><span class="loading-spinner"></span><br>正在获取今日 AI 日报...</div>
    <div class="hero-stats" id="heroStats">
      <div class="stat-pill">
        <span class="stat-num" id="count-total">—</span>
        <span class="stat-label">📊 总条数</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-model">0</span>
        <span class="stat-label">🤖 模型更新</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-product">0</span>
        <span class="stat-label">📦 产品发布</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-industry">0</span>
        <span class="stat-label">🏭 行业动态</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-paper">0</span>
        <span class="stat-label">📄 论文研究</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-tip">0</span>
        <span class="stat-label">💡 技巧观点</span>
      </div>
    </div>
  </div>

  <nav class="nav-bar" id="navBar"></nav>

  <div id="contentArea"></div>

ack 等数据索引为 Obsidian 风格的知识图谱，提供持久上下文记忆。内置邮件客户端、浏览器、会议记录器、代码模式（可调用 Claude Code 或 Codex 代理），并支持按事件或定时运行的背景代理。用户可通过 MCP 协议接入 Exa 搜索、GitHub 等外部工具。所有数据以纯 Markdown 格式本地存储，无供应商锁定，支持 Ollama/LM Studio 本地模型或使用 API 密钥的托管模型。","sourceUrl":"https://github.com/rowboatlabs/rowboat","sourceName":"Hacker News：AI 热帖","permalink":"https://aihot.virxact.com/items/cmrb7dzge01d6ihl1bthomtam","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrb7dzge01d6ihl1bthomtam"},"tier":2,"ai_relevant":false,"personalizedSummary":"开源本地AI助手，索引邮件/Slack数据做持久记忆，支持Claude Code代理和MCP协议，数据纯Markdown本地存储无供应商锁定"},{"title":"Grok Imagine 更新：支持 15 秒视频","summary":"Grok Imagine 更新。请更新你的 Grok 应用！15 秒 Imagine 视频现已可用，质量令人难以置信。","sourceUrl":"https://x.com/elonmusk/status/2074378653501128833","sourceName":"X：Elon Musk (@elonmusk, xAI)","permalink":"https://aihot.virxact.com/items/cmraai9ic00q4ihl3ozf3ki9s","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmraai9ic00q4ihl3ozf3ki9s"},"tier":3,"ai_relevant":false,"personalizedSummary":"Grok Imagine 更新。请更新你的 Grok 应用！15 秒 Imagine 视频现已可用，质量令人难以置信。"},{"title":"Claude Cowork 向移动端和网页端开放","summary":"Claude Cowork 正在向移动端和网页端开放，让会话和文件跨设备同步。Beta 版将在未来几周内首先面向 Max 用户推出。Cowork 可让 Claude 跨文件、日历、邮件、即时通讯等工具完成复杂任务，其中超过 90% 的使用场景并非软件开发，而是日常知识工作（业务运营和内容创作）。工作可跨设备跟随用户：在桌面端开始任务，从手机查看进度；关闭笔记本后 Claude 可继续后台运行，支持定时任务（如周一 6 点自动准备客户简报）。当需要用户决策时，Claude 会将问题推送到手机。桌面端保留完整 Cowork 体验，支持无法安装桌面应用的用户。聊天和 Cowork 已在网页端和桌面端合并。为庆祝上线，双倍 Cowork 使…","sourceUrl":"https://claude.com/blog/cowork-web-mobile","sourceName":"Claude：Blog（网页）","permalink":"https://aihot.virxact.com/items/cmrav068k01b6ihogth8k26f6","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrav068k01b6ihogth8k26f6"},"tier":2,"ai_relevant":false,"personalizedSummary":"Claude Cowork 开放移动端和网页端，支持跨设备同步和后台定时任务，90%使用场景为业务运营和内容创作"},{"title":"Gemini API Managed Agents 新增后台执行、远程 MCP 与自定义函数等能力","summary":"Google 为 Gemini API 的 Managed Agents 新增后台执行、远程 MCP 服务器集成、自定义函数调用与凭证刷新功能。后台执行通过传入 `background: true` 异步运行任务，立即返回 ID 供轮询状态或流式获取进度。Managed Agents 可直接连接远程 MCP 服务器，无需自定义代理中间件，并能与内置沙箱工具（如 Google 搜索、代码执行）混合使用。自定义函数调用支持本地执行业务逻辑，内置工具自动在服务端运行。凭证刷新通过传递现有环境 ID 和新网络配置完成，沙箱内文件系统、已安装包和仓库保持不变。这些更新旨在帮助开发者构建可靠的生产级 AI 智能体。","sourceUrl":"https://blog.google/innovation-and-ai/technology/developers-tools/expanding-managed-agents-gemini-api","sourceName":"Google Blog：AI（RSS）","permalink":"https://aihot.virxact.com/items/cmraw22r701jjihogh1k8hbu6","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmraw22r701jjihogh1k8hbu6"},"tier":2,"ai_relevant":false,"personalizedSummary":"Gemini Agent 新增后台执行和远程 MCP 集成能力，为 Agent 架构设计提供技术参考"},{"title":"NotebookLM短视频概览正式上线","summary":"短视频概览功能已正式在移动端和网页端面向所有英语用户全面上线！ 一如既往，您的意见对我们至关重要。请在下方分享您最喜欢的作品，并告诉我们接下来需要添加哪些功能！❤️","sourceUrl":"https://x.com/NotebookLM/status/2074551227594264799","sourceName":"X：NotebookLM (@NotebookLM)","permalink":"https://aihot.virxact.com/items/cmray36fg021nihogfo205417","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmray36fg021nihogfo205417"},"tier":3,"ai_relevant":false,"personalizedSummary":"短视频概览功能已正式在移动端和网页端面向所有英语用户全面上线！ 一如既往，您的意见对我们至关重要。请在下方分享您最喜欢的作品，并告诉我们接下来需要添加哪些功能！❤️"},{"title":"Hugging Face Storage 成为 SkyPilot 一级后端：零出站费跨云存储","summary":"Hugging Face Storage 现为 SkyPilot 的一级后端。用户通过 `hf://` URL 和现有 HFTOKEN 即可将 Hugging Face Bucket（读写）或模型/数据集/Space 仓库（只读）挂载到 SkyPilot 任务中，支持 MOUNT（FUSE 懒加载）或 COPY 模式。SkyPilot 可将任务调度到 20+ 云、Kubernetes、Slurm 及本地集群的任意可用 GPU 上。Hugging Face 不收取出站及 CDN 费用，故跨云读取数据无额外成本。存储价格 $12–18/TB/月，低于 AWS S3 加出站费。Bucket 基于 Xet，增量检查点和模型变体仅存储和传输改…","sourceUrl":"https://huggingface.co/blog/skypilot-hf-storage","sourceName":"Hugging Face：Blog（RSS）","permalink":"https://aihot.virxact.com/items/cmrb18k7802uuihogxse92jx2","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrb18k7802uuihogxse92jx2"},"tier":3,"ai_relevant":false,"personalizedSummary":"Hugging Face Storage 现为 SkyPilot 的一级后端。用户通过 `hf://` URL 和现有 HFTOKEN 即可将 Hugging Face Bucket（读写）或模型/数据集/Space 仓库（只读）挂载到 SkyPilot 任务中，支持 MOUNT（FUSE 懒加载）或 COPY 模式。SkyPilot 可将任务调度到 20+ 云、Kubernetes、Slurm 及本地集群的任意可用 GPU 上。Hugging Face 不收取出站及 CDN 费用，故跨云读取数据无额外成本。存储价格 $12–18/TB/月，低于 AWS S3 加出站费。Bucket 基于 Xet，增量检查点和模型变体仅存储和传输改…"},{"title":"Claude Code v2.1.203 发布","summary":"本次更新新增登录过期警告和手动权限模式标记，并将附加工作目录加入 MCP roots/list。修复了 macOS 下因内存检测误报导致后台会话卡顿 15–20 秒（回归自 2.1.196）、后台会话因 token 过期永久不可用（现自动恢复）、交互式会话中上下文指示器每轮重分析整个对话导致 CPU 和内存回归等问题。同时改进了长响应流时的实时预览性能，并降低了子代理重新委托任务的倾向。二进制体积减少约 7 MB，启动内存减少约 7 MB。左侧箭头不再关闭后台任务/差异/工作流详情视图，改为 Esc。","sourceUrl":"https://github.com/anthropics/claude-code/releases/tag/v2.1.203","sourceName":"Claude Code：GitHub Releases（RSS）","permalink":"https://aihot.virxact.com/items/cmrb58ru600tpihl166b491rz","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrb58ru600tpihl166b491rz"},"tier":2,"ai_relevant":false,"personalizedSummary":"Claude Code 小版本更新，修复后台会话卡顿和 Token 过期问题，体积和内存各减少约 7MB"}]},{"label":"行业动态","items":[{"title":"中国拟限制外国访问最强AI模型","summary":"中国计划限制外国访问其最强AI模型，近期与阿里巴巴、字节跳动、Z.ai等企业会谈，拟将先进模型（含未发布）留在中国国内。商务部主导、国家发改委参与，表明此举属出口管制而非平台监管。目标涵盖闭源和开源模型，不仅限API访问，还包括可下载权重。同时讨论将模型泄漏视为国家安全犯罪，并限制外国资本投资中国AI初创。若实施，外国公司将失去低成本模型访问权。此前华盛顿已限制美国先进模型出口，此举可能进一步分裂全球AI市场。","sourceUrl":"https://x.com/rohanpaul_ai/status/2074512389526237609","sourceName":"X：Rohan Paul (@rohanpaul_ai)","permalink":"https://aihot.virxact.com/items/cmrasueu500qmihog3d8up11t","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrasueu500qmihog3d8up11t"},"tier":2,"ai_relevant":false,"personalizedSummary":"中国计划限制外国访问其最强AI模型，已与阿里、字节等会谈，涵盖闭源和开源模型权重出口管制，若实施将进一步分裂全球AI市场。你在广东，作为使用外国AI工具的中国电商店主，需关注此政策走向——它可能影响你获取低成本AI模型的通道，但目前尚在讨论阶段，短期内不会影响你用 Claude/GPT 等服务。"},{"title":"Ethan Mollick：开放权重模型供给难持续","summary":"这是一个关键原因，我不期望前沿开放权重模型的流动会无限期持续，甚至不会持续更长时间。","sourceUrl":"https://x.com/emollick/status/2074497401578996154","sourceName":"X：Ethan Mollick (@emollick)","permalink":"https://aihot.virxact.com/items/cmraqliu1003aihogho9twifr","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmraqliu1003aihogho9twifr"},"tier":3,"ai_relevant":false,"personalizedSummary":"这是一个关键原因，我不期望前沿开放权重模型的流动会无限期持续，甚至不会持续更长时间。"},{"title":"微软为降成本在Copilot中用自研MAI模型替换OpenAI和Anthropic模型","summary":"微软正用自研MAI模型替换Copilot产品中的OpenAI和Anthropic模型以降低支出。MAI模型已在Excel和Outlook中每周处理数万次请求，但占比仍小。Build大会上发布推理模型MAI-Thinking 1，声称编码媲美Sonnet 4.6和Opus 4.6，但基准测试大幅落后，仅与DeepSeek V3.2相当。AI负责人承认目标是削减并消除对Anthropic的支出。CEO暗示未来可能按用量计费，MAI为默认，第三方模型付费附加。微软称MAI使用干净商业许可数据，实际基于Common Crawl。","sourceUrl":"https://the-decoder.com/copilot-goes-cheap-as-microsoft-phases-out-openai-and-anthropic-models-to-cut-costs","sourceName":"The Decoder：AI News（RSS）","permalink":"https://aihot.virxact.com/items/cmrb0u6pv02qtihogovduu795","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrb0u6pv02qtihogovduu795"},"tier":2,"ai_relevant":false,"personalizedSummary":"微软在 Copilot 中用自研模型替换 OpenAI/Anthropic 以降低成本，但 MAI 基准测试仅与 DeepSeek V3.2 相当——说明自研模型节省成本的可能代价是能力下降"},{"title":"美国首批自主地面车辆在乌克兰参战","summary":"美国自动驾驶车辆公司 Forterra 宣布，过去九个月已向乌克兰战场部署超过 100 辆基于 Polaris ATV 的 Lancer 自主地面车辆。这些汽油动力车辆可携带 750 公斤货物，加装 Starlink 天线实现远程操控，已执行 1100 多次任务，行驶 2500 英里，运送 777,440 磅物资，完成 52 次伤员撤离。目前车辆主要采用远程操作，因自主系统尚无法实时识别并应对敌方威胁。Forterra 已融资超 5 亿美元，正将经典机器人方法与生成式 AI 结合以提升自主能力。美军专家认为地面自主技术已具实战价值。","sourceUrl":"https://techcrunch.com/2026/07/07/the-first-american-autonomous-ground-vehicles-are-fighting-in-ukraine","sourceName":"TechCrunch：AI（RSS）","permalink":"https://aihot.virxact.com/items/cmrafv8m40090ihuamebn107w","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrafv8m40090ihuamebn107w"},"tier":3,"ai_relevant":false,"personalizedSummary":"美国自动驾驶车辆公司 Forterra 宣布，过去九个月已向乌克兰战场部署超过 100 辆基于 Polaris ATV 的 Lancer 自主地面车辆。这些汽油动力车辆可携带 750 公斤货物，加装 Starlink 天线实现远程操控，已执行 1100 多次任务，行驶 2500 英里，运送 777,440 磅物资，完成 52 次伤员撤离。目前车辆主要采用远程操作，因自主系统尚无法实时识别并应对敌方威胁。Forterra 已融资超 5 亿美元，正将经典机器人方法与生成式 AI 结合以提升自主能力。美军专家认为地面自主技术已具实战价值。"}]},{"label":"论文研究","items":[{"title":"苹果研究：单个神经元即可绕过大型语言模型的安全对齐","summary":"苹果研究人员发现，安全对齐由两类神经元调控：拒绝神经元控制有害知识是否表达，概念神经元编码有害知识本身。在七个模型（1.7B至70B参数）中，仅需抑制单个拒绝神经元即可绕过安全对齐，回答有害请求；或放大单个概念神经元，从无害提示诱导出有害内容。整个过程无需训练或提示工程。结果表明安全对齐由个别神经元因果控制。","sourceUrl":"https://machinelearning.apple.com/research/single-neuron-safety-alignment","sourceName":"Apple Machine Learning Research（RSS）","permalink":"https://aihot.virxact.com/items/cmrasd6r300i2ihog8ifwrqs5","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrasd6r300i2ihog8ifwrqs5"},"tier":3,"ai_relevant":false,"personalizedSummary":"苹果研究人员发现，安全对齐由两类神经元调控：拒绝神经元控制有害知识是否表达，概念神经元编码有害知识本身。在七个模型（1.7B至70B参数）中，仅需抑制单个拒绝神经元即可绕过安全对齐，回答有害请求；或放大单个概念神经元，从无害提示诱导出有害内容。整个过程无需训练或提示工程。结果表明安全对齐由个别神经元因果控制。"},{"title":"Weblica：面向视觉网页智能体的可扩展可复现训练环境","summary":"苹果研究团队提出Weblica框架，通过HTTP级缓存保存网页稳定视觉状态并保留交互行为，结合大语言模型基于真实网站与核心导航技能合成环境，构建可复现、可扩展的训练环境。该框架将强化学习训练扩展到数千个多样化的环境和任务。最佳模型Weblica-8B在多个网页导航基准上超越同等规模的开源模型，推理步骤更少，测试时计算扩展性良好，性能与API模型相当。","sourceUrl":"https://machinelearning.apple.com/research/weblica-visual-web-agents","sourceName":"Apple Machine Learning Research（RSS）","permalink":"https://aihot.virxact.com/items/cmrasd6r300i0ihog8xxwezye","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrasd6r300i0ihog8xxwezye"},"tier":3,"ai_relevant":false,"personalizedSummary":"苹果研究团队提出Weblica框架，通过HTTP级缓存保存网页稳定视觉状态并保留交互行为，结合大语言模型基于真实网站与核心导航技能合成环境，构建可复现、可扩展的训练环境。该框架将强化学习训练扩展到数千个多样化的环境和任务。最佳模型Weblica-8B在多个网页导航基准上超越同等规模的开源模型，推理步骤更少，测试时计算扩展性良好，性能与API模型相当。"},{"title":"DynaMiCS：带性能约束的大语言模型动态混合微调","summary":"DynaMiCS是一种动态混合优化器，将多领域微调建模为带性能约束的优化问题。它通过短领域特定探测运行估计跨领域效应斜率矩阵，再基于概率单纯形优化计算混合权重，在提升目标领域性能的同时将约束领域损失维持在参考水平以下。实验表明，DynaMiCS相比固定混合基线取得更强的目标领域提升和约束满足，且计算成本更低，无需参考模型、逐样本评分或手动调节混合权重。","sourceUrl":"https://machinelearning.apple.com/research/dynamics-fine-tuning-llms","sourceName":"Apple Machine Learning Research（RSS）","permalink":"https://aihot.virxact.com/items/cmrasd6r300hxihog9hxmteoz","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrasd6r300hxihog9hxmteoz"},"tier":3,"ai_relevant":false,"personalizedSummary":"DynaMiCS是一种动态混合优化器，将多领域微调建模为带性能约束的优化问题。它通过短领域特定探测运行估计跨领域效应斜率矩阵，再基于概率单纯形优化计算混合权重，在提升目标领域性能的同时将约束领域损失维持在参考水平以下。实验表明，DynaMiCS相比固定混合基线取得更强的目标领域提升和约束满足，且计算成本更低，无需参考模型、逐样本评分或手动调节混合权重。"}]},{"label":"技巧与观点","items":[{"title":"Elvis Saravia 通过 HITL 和 DialAgent 提升 agentic loops 可靠性","summary":"Elvis Saravia 介绍使用 human-in-the-loop（HITL）来提升 agentic loops 的可靠性。他所有 Claude 和 Codex agent 会话都通过 @DialAgent MCP 服务器，该服务器为 agent 提供专属号码，支持语音、SMS、iMessage 作为原生工具。当循环/自动化处理 PR 或新功能时，agent 会通过简短电话将决策升级给人类，尤其适合在路上或离开电脑时。用户可粘贴指令让 agent 拨打电话测试。DialAgent 提供 $5 免费额度：http://getdial.ai","sourceUrl":"https://x.com/omarsar0/status/2074506169352180108","sourceName":"X：Elvis Saravia (@omarsar0, DAIR.AI)","permalink":"https://aihot.virxact.com/items/cmrasc88300h6ihog8mwnmob9","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrasc88300h6ihog8mwnmob9"},"tier":1,"ai_relevant":true,"personalizedSummary":"对你说：Elvis Saravia 介绍了用 HITL（人在回路中）来提升 AI Agent 的可靠性。他所有 Claude/Codex Agent 都通过 DialAgent 这个 MCP 服务器接入，Agent 在遇到需要决策的情况时会通过电话、SMS 或 iMessage 联系人类，尤其适合你这种经常在路上或在咖啡店工作的情况。DialAgent 给 Agent 分配专属号码，当你的客服 Agent 遇到无法处理的复杂咨询时，可以自动转接给你——这正是你开发客服系统的核心模式。$5 免费额度可以体验：http://getdial.ai"},{"title":"FDE爆发：AI公司12个月承诺97.5亿美元部署工程","summary":"AI公司在12个月内合计承诺97.5亿美元用于建设前部署工程（FDE）团队。三种结构模型浮现：资产负债模型（微软、亚马逊从现有编制调配，Salesforce承诺1000个FDE岗位）；独立实体模型（OpenAI Deployment Company融资40亿美元，投后估值140亿；Anthropic从黑石等融资15亿美元）；合作伙伴生态系统模型（Google Cloud承诺7.5亿美元合作伙伴基金）。瓶颈从模型能力转向部署——GPT-4、Claude、Gemini已足够强大，但多数企业无法自行安装配置。FDE投资构成护城河：嵌入式工程师教育客户、获取专有工作流与数据反馈模型调优，切换成本为制度性而非技术性。","sourceUrl":"https://www.tomtunguz.com/the-10b-fde-boom","sourceName":"Tomer Tunguz 博客（VC 分析）","permalink":"https://aihot.virxact.com/items/cmraxmzfq01y0ihog3h7t344t","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmraxmzfq01y0ihog3h7t344t"},"tier":1,"ai_relevant":true,"personalizedSummary":"对你说：AI 行业的瓶颈已从「模型不够强」转向「部署不到位」——97.5 亿美元涌入 FDE（部署工程）团队。这意味着把 AI 接入真实业务环境才是真正的壁垒。你正在做的客服系统、订单自动化、客户沟通，本质上就是在做 FDE——把 AI 模型接入你的 Shopify 店铺。这个趋势验证了你的方向正确：不是等更好的模型，而是把现有模型用好、用对地方。OpenAI 和 Anthropic 都已成立专门做部署的独立公司，说明即使是它们也认为「让企业用起来」比「造更强的模型」更难也更重要。"},{"title":"YC CEO声称每日用AI部署3.7万行代码，开发者审查发现前端代码大量臃肿低效","summary":"Y Combinator CEO Garry Tan在X上宣称，他与AI编码代理每天在五个项目中部署37000行代码，并保持连续72天发布记录。波兰开发者Gregorein深入审查Tan网站前端代码，发现大量臃肿与低效问题：页面加载169次请求、总计6.42MB数据（对比Hacker News仅7次12KB）；包含28个测试文件、78个未使用的JavaScript控制器、八种格式Logo（含空文件）、未压缩的旧PNG等。Gregorein指出，AI虽能快速生成代码，但质量仍应优先于数量。","sourceUrl":"https://www.fastcompany.com/91520702/y-combinator-garry-tan-agentic-ai-social-media","sourceName":"Hacker News 热门（buzzing.cc 中文翻译）","permalink":"https://aihot.virxact.com/items/cmrayv5ja0293ihog3rixaqua","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrayv5ja0293ihog3rixaqua"},"tier":2,"ai_relevant":false,"personalizedSummary":"YC CEO 称每日用 AI 部署 3.7 万行代码，但第三方审查发现前端代码臃肿低效——用 AI 快速生成代码时，质量把关仍是必须付出的注意力成本"},{"title":"Liquid AI 开源 Antidoom：基于最终 Token 偏好优化的推理模型死循环修复方法","summary":"Liquid AI 开源了 Antidoom，一种基于 Final Token Preference Optimization (FTPO) 的针对性修复方法，用于减少推理模型中的 doom loop（死循环）问题。该方法定位循环开始的第一个 token，训练模型选择连贯替代项，而不改变整体输出分布。在 LFM2.5-2.6B 上，硬数学和编程任务中的循环率从 10.2% 降至 1.4%；Qwen3.5-4B 上从 22.9% 降至 1%。整套流程可在数小时内完成，全部代码和数据集（LiquidAI/antidoom-mix-v1.0）已开源。","sourceUrl":"https://www.marktechpost.com/2026/07/07/liquid-ai-antidoom-doom-loops-ftpo","sourceName":"MarkTechPost（RSS）","permalink":"https://aihot.virxact.com/items/cmraw21y401jhihog3tcrfsp4","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmraw21y401jhihog3tcrfsp4"},"tier":3,"ai_relevant":false,"personalizedSummary":"Liquid AI 开源了 Antidoom，一种基于 Final Token Preference Optimization (FTPO) 的针对性修复方法，用于减少推理模型中的 doom loop（死循环）问题。该方法定位循环开始的第一个 token，训练模型选择连贯替代项，而不改变整体输出分布。在 LFM2.5-2.6B 上，硬数学和编程任务中的循环率从 10.2% 降至 1.4%；Qwen3.5-4B 上从 22.9% 降至 1%。整套流程可在数小时内完成，全部代码和数据集（LiquidAI/antidoom-mix-v1.0）已开源。"},{"title":"在网络不稳定的地区，小型AI模型正逐渐普及","summary":"2019年，Adebayo Alonge因服务器远在美国致RxScanner单次扫描超5分钟，工程师2小时内将AI模型缩小至可在Android手机本地运行，此后RxScanner能在无宽带、缺电地区验药。小AI模型参数通常至多几十亿，可在手机或Raspberry Pi上运行，功耗仅数瓦。类似案例包括印度腰果病害检测无人机、乌拉圭蚂蚁入侵识别、疟蚊检测及巴西基于Arduino的心电图设备。世界银行报告显示，全球最穷国家仅0.7%互联网用户用过ChatGPT，发达国家达四分之一；行长认为小AI是为缺乏算力与电力的地区提供生命救助服务的关键。","sourceUrl":"https://spectrum.ieee.org/small-language-models-ai-pharmaceuticals","sourceName":"Hacker News 热门（buzzing.cc 中文翻译）","permalink":"https://aihot.virxact.com/items/cmrab8cy800w3ihl38ohuxzih","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrab8cy800w3ihl38ohuxzih"},"tier":3,"ai_relevant":false,"personalizedSummary":"2019年，Adebayo Alonge因服务器远在美国致RxScanner单次扫描超5分钟，工程师2小时内将AI模型缩小至可在Android手机本地运行，此后RxScanner能在无宽带、缺电地区验药。小AI模型参数通常至多几十亿，可在手机或Raspberry Pi上运行，功耗仅数瓦。类似案例包括印度腰果病害检测无人机、乌拉圭蚂蚁入侵识别、疟蚊检测及巴西基于Arduino的心电图设备。世界银行报告显示，全球最穷国家仅0.7%互联网用户用过ChatGPT，发达国家达四分之一；行长认为小AI是为缺乏算力与电力的地区提供生命救助服务的关键。"},{"title":"Krea 2 身份保留功能上线","summary":"Krea 2 的身份保留功能已发布，配套模型和 ComfyUI 节点也已上线。🔥","sourceUrl":"https://x.com/krea_ai/status/2074589965653303321","sourceName":"X：Krea AI (@krea_ai)","permalink":"https://aihot.virxact.com/items/cmrb4j2zx00n4ihl14u6xv7kz","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrb4j2zx00n4ihl14u6xv7kz"},"tier":3,"ai_relevant":false,"personalizedSummary":"Krea 2 的身份保留功能已发布，配套模型和 ComfyUI 节点也已上线。🔥"},{"title":"人们如何使用Claude Cowork","summary":"基于2026年5月11-31日120万次匿名会话样本，Claude Cowork最大用途为业务流程与运营（33.4%），如整理报告、核对表格；其次为内容创作与文案（16.4%），如起草稿件、制作幻灯片；软件开发仅占8.7%。用户多用它处理跨团队衔接性任务，例如律师处理文档格式、招聘经理汇总面试反馈。Claude Cowork面向所有Claude用户开放。","sourceUrl":"https://claude.com/blog/how-people-are-using-claude-cowork","sourceName":"Claude：Blog（网页）","permalink":"https://aihot.virxact.com/items/cmrav068k01b7ihogl498wk0x","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrav068k01b7ihogl498wk0x"},"tier":1,"ai_relevant":true,"personalizedSummary":"对你说：Claude Cowork 的 120 万次会话数据显示，最大用途是业务流程与运营（33.4%），如整理报告、核对表格；内容创作（16.4%）次之；软件开发仅占 8.7%。这说明 AI 在日常经营的「杂务」上价值远大于写代码。你正在开发的客服系统、订单核对、客户沟通正好都属于这个范畴——AI 帮你把这些时间释放出来，专注在开发大客户上。Claude Cowork 的数据也暗示：跨境电商的邮件回复、订单状态跟踪、供应商沟通等跨系统衔接任务，是 AI 最能帮你省时间的地方。"},{"title":"在 Claude Code 中选择 Claude 模型与努力级别","summary":"Claude Code 提供模型（model）和努力级别（effort）两种设置。模型选择决定能力范围，更大模型（如 Claude Fable 5）在基准上优于 Claude Sonnet。努力级别不单是思考时间，还控制读取文件数、验证步骤及多步任务的推进深度。较高努力下 Claude 会自行读取文件、运行测试并复核；较低努力则更倾向请求用户提供上下文。若 Claude 已掌握上下文但仍出错，应换更强大模型；若因跳读文件或未运行测试而出错，则应提高努力级别。","sourceUrl":"https://claude.com/blog/claude-model-and-effort-level-in-claude-code","sourceName":"Claude：Blog（网页）","permalink":"https://aihot.virxact.com/items/cmraqmpst004cihogf6nqkgvh","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmraqmpst004cihogf6nqkgvh"},"tier":1,"ai_relevant":true,"personalizedSummary":"对你说：Claude Code 官方教程厘清了模型选择和努力级别这两个核心设置的区别——模型选 Fable 5 还是 Sonnet 解决的是「能力够不够」的问题，而努力级别解决的是「它有没有认真找信息」的问题。错误类型判断口诀：如果它知道上下文但做错了→换更大模型；如果它跳读了文件没验证就下结论→提高努力级别。这对你用 Claude Code 开发客服系统很实用：省下盲目切换模型浪费的 API 费用，先判断问题根因再对症下药。"}]}],"flashes":[]}</script>

const MOON_NAMES = ['🌑 新月','🌒 蛾眉月','🌓 上弦月','🌔 盈凸月','🌕 满月','🌖 亏凸月','🌗 下弦月','🌘 残月'];
function getMoonName(phase) { return MOON_NAMES[Math.floor((phase % 1) * 8) % 8]; }
function setMoonPhase(phase) {
  const litPath = document.getElementById('moonLitPath');
  const clipPath = document.getElementById('moonLitClipPath');
  if (!litPath) return;
  const p = phase % 1, cx = 50, cy = 50, r = 46;
  let d = '';
  if (p < 0.002 || p > 0.998) { d = ''; }
  else if (Math.abs(p - 0.5) < 0.002) { d = 'M '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 1 1 '+cx+' '+(cy+r)+' A '+r+' '+r+' 0 1 1 '+cx+' '+(cy-r)+' Z'; }
  else {
    const cosPhase = Math.cos(2 * Math.PI * p);
    const minor = Math.abs(cosPhase) * r;
    const waxing = p < 0.5;
    const outerSweep = waxing ? 1 : 0;
    const innerSweep = cosPhase < 0 ? 1 : 0;
    d = 'M '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 0 '+outerSweep+' '+cx+' '+(cy+r)+' A '+minor.toFixed(2)+' '+r+' 0 0 '+innerSweep+' '+cx+' '+(cy-r)+' Z';
  }
  litPath.setAttribute('d', d);
  if (clipPath) clipPath.setAttribute('d', d);
  const moonEl = document.getElementById('moonEl');
  const angle = p * Math.PI * 0.4 - 0.15;
  moonEl.style.top = (55 + Math.sin(angle) * 25) + 'px';
  moonEl.style.right = (35 + Math.cos(angle) * 20) + 'px';
}

function getBJ() {

  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

const MY_LAT = 23.08, MY_LNG = 114.42;
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function calcSolarElevation(lat, lng, date) {
  const jd = date.getTime() / 86400000 + 2440587.5;
  const n = jd - 2451545.0;
  const L = (280.460 + 0.9856474 * n) % 360;
  const g = (357.528 + 0.9856003 * n) % 360;
  const lambda = L + 1.915 * Math.sin(toRad(g)) + 0.020 * Math.sin(toRad(2 * g));
  const epsilon = 23.439 - 0.0000004 * n;
  const decl = toDeg(Math.asin(Math.sin(toRad(epsilon)) * Math.sin(toRad(lambda))));
  const gmst = (280.46061837 + 360.98564736629 * n) % 360;
  const lst = (gmst + lng) % 360;
  const ha = ((lst - lambda) + 180) % 360 - 180;
  return toDeg(Math.asin(Math.sin(toRad(lat)) * Math.sin(toRad(decl)) + Math.cos(toRad(lat)) * Math.cos(toRad(decl)) * Math.cos(toRad(ha))));
}
function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  return '#'+((1<<24)+(Math.round((ah>>16)+((bh>>16)-(ah>>16))*t)<<16)+(Math.round(((ah>>8)&0xff)+(((bh>>8)&0xff)-((ah>>8)&0xff))*t)<<8)+Math.round((ah&0xff)+((bh&0xff)-(ah&0xff))*t)).toString(16).slice(1);
}
function computeSkyGradient(elev, wcode) {
  let top, mid, bottom;
  if (elev < -15) { top='#0a0a2e'; mid='#0a0a2e'; bottom='#0a0a2e'; }
  else if (elev < -7) { const t=(elev+15)/8; top=lerpColor('#0a0a2e','#12103e',t); mid=lerpColor('#0a0a2e','#1a1a4e',t); bottom=lerpColor('#0a0a2e','#2a2060',t); }
  else if (elev < -2) { const t=(elev+7)/5; top=lerpColor('#12103e','#1a1a5e',t); mid=lerpColor('#1a1a4e','#2a3a7e',t); bottom=lerpColor('#2a2060','#4a5a9e',t); }
  else if (elev < 3) { const t=(elev+2)/5; top=lerpColor('#1a1a5e','#3a206a',t); mid=lerpColor('#2a3a7e','#c85a3e',t); bottom=lerpColor('#d46a3e','#f4a261',t); }
  else if (elev < 10) { const t=(elev-3)/7; top=lerpColor('#3a206a','#8ab8e8',t); mid=lerpColor('#c85a3e','#b0d8f0',t); bottom=lerpColor('#f4a261','#eef6fe',t); }
  else if (elev < 30) { const t=(elev-10)/20; top=lerpColor('#8ab8e8','#a0c8f0',t); mid=lerpColor('#b0d8f0','#cce0f5',t); bottom=lerpColor('#d0e8f5','#eef6fe',t); }
  else { top='#8ab8e8'; mid='#c0ddf5'; bottom='#eef6fe'; }
  if (wcode !== null && wcode !== undefined) {
    let dull = 0;
    if (wcode >= 3 && wcode <= 4) dull = 0.25;
    else if (wcode >= 5) dull = 0.35;
    if (dull > 0) { top=lerpColor(top,'#8a8a9a',dull); mid=lerpColor(mid,'#8a8a9a',dull); bottom=lerpColor(bottom,'#8a8a9a',dull); }
  }
  return 'linear-gradient(160deg, '+top+' 0%, '+mid+' 35%, '+bottom+' 100%)';
}
function getGreeting(h) {
  if (h >= 5 && h < 9) return { icon:'🌅', label:'早安' };
  if (h >= 9 && h < 12) return { icon:'☀️', label:'上午好' };
  if (h >= 12 && h < 14) return { icon:'🌤️', label:'午好' };
  if (h >= 14 && h < 17) return { icon:'🌞', label:'下午好' };
  if (h >= 17 && h < 19) return { icon:'🌇', label:'傍晚好' };
  if (h >= 19 && h < 23) return { icon:'🌆', label:'晚上好' };
  return { icon:'🌙', label:'深夜好' };
}
let _cachedWCode = null;
function updateSky() {
  const now = new Date();

function humanTime(iso) {
  if (!iso) return null;
  const t=new Date(iso); if(isNaN(t.getTime())) return null;
  const bj=new Date(t.getTime()+8*3600000), nowBJ=new Date(new Date().getTime()+8*3600000);
  const diffMin=Math.floor((nowBJ-bj)/60000), diffHr=Math.floor(diffMin/60);
  const h=bj.getUTCHours(), m=bj.getUTCMinutes();
  const pad=n=>String(n).padStart(2,'0'), hm=pad(h)+':'+pad(m);
  const p=h<6?'凌晨':h<9?'早上':h<12?'上午':h<13?'中午':h<18?'下午':h<20?'傍晚':'晚上';
  if(diffMin<5) return '刚刚';
  if(diffMin<60) return diffMin+'分钟前';
  if(diffHr<24&&bj.getUTCDate()===nowBJ.getUTCDate()) return '今天'+p+' '+hm;
  if(diffHr<48) return '昨天'+p+' '+hm;
  return (bj.getUTCMonth()+1)+'/'+bj.getUTCDate()+' '+hm;
}

function formatDataDate(dateStr) {

  var parts=dateStr.split('-');
  var d=new Date(Date.UTC(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])));
  var wds=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  return parts[0]+'年'+parseInt(parts[1])+'月'+parseInt(parts[2])+'日（'+wds[d.getUTCDay()]+'）';
}

function toggleXCard(btn) {
  var card = btn.closest('.card');
  if (!card) return;
  var summary = card.querySelector('.card-summary');
  if (!summary) return;
  var isClamped = summary.classList.contains('clamped');
  if (isClamped) {
    summary.classList.remove('clamped');
    summary.classList.add('unclamped');
    btn.innerHTML = '收起 ↑';
  } else {
    summary.classList.add('clamped');
    summary.classList.remove('unclamped');
    btn.innerHTML = '展开全文 ↓';
  }
}

}

// ============================================================
//  三级展开/折叠 + 滚回自动收起
// ============================================================
var tier3AutoCollapseObserver = null;

function collapseTier3() {
  var wrapper = document.getElementById('tier3Wrapper');
  var btn = document.getElementById('tier3ExpandBtn');
  if (!wrapper || !btn) return;
  if (!wrapper.classList.contains('expanded')) return;
  wrapper.classList.add('collapsed');
  wrapper.classList.remove('expanded');
  btn.classList.remove('expanded');
  var count = wrapper.querySelectorAll('.tier3-card').length;
  btn.innerHTML = '<span class="arrow">↓</span> 展开剩余 '+count+' 条';
  // 停止监听
  if (tier3AutoCollapseObserver) {
    tier3AutoCollapseObserver.disconnect();
    tier3AutoCollapseObserver = null;
  }
}

function toggleTier3() {
  var wrapper = document.getElementById('tier3Wrapper');
  var btn = document.getElementById('tier3ExpandBtn');
  if (!wrapper || !btn) return;
  var isCollapsed = wrapper.classList.contains('collapsed');
  if (isCollapsed) {
    // 展开
    wrapper.classList.remove('collapsed');
    wrapper.classList.add('expanded');
    btn.classList.add('expanded');
    btn.innerHTML = '<span class="arrow">↓</span> 重新折叠';
    // 启动 IntersectionObserver：监听触发哨兵元素（行业全景标题区上方）
    // 当哨兵重新进入视口（用户滚回来），自动折叠
    var sentinel = document.getElementById('tier3Sentinel');
    if (sentinel && 'IntersectionObserver' in window) {
      // 先断开旧的
      if (tier3AutoCollapseObserver) tier3AutoCollapseObserver.disconnect();
      // 延迟 800ms 再启动监听，避免刚展开就触发折叠
      setTimeout(function() {
        tier3AutoCollapseObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            // 哨兵重新出现在视口中（用户向上滚回来了）
            if (entry.isIntersecting) {
              collapseTier3();
            }
          });
        }, {
          root: null,
          // 只在哨兵从下方消失后再回到视口时触发（顶部 0px 边界）
          rootMargin: '0px 0px -80% 0px',
          threshold: 0
        });
        tier3AutoCollapseObserver.observe(sentinel);
      }, 800);
    }
  } else {
    collapseTier3();
  }
}

// ============================================================
//  主流程
// ============================================================
function main() {
  updateSky();
  fetchWeather();
  setInterval(updateSky, 180000);
  setInterval(function() { fetchWeather(); }, 1800000);
  setMoonPhase(calcMoonPhase(new Date()));

  try {
    var el = document.getElementById('embeddedData');
    var data = null;
    if (el && el.textContent) {
      data = JSON.parse(el.textContent);
    }
    if (!data || !data.sections || data.sections.length === 0) throw new Error('无数据');
    render(data);
  } catch (err) {
    document.getElementById('contentArea').innerHTML = '<div class="error-state"><div class="error-icon">😅</div><p>数据加载失败</p><p style="font-size:12px;margin-top:8px;color:rgba(255,255,255,0.5)">'+err.message+'</p><a class="retry-btn" onclick="location.reload()">重新加载</a></div>';
    document.getElementById('heroGreeting').innerHTML = '暂时无法获取日报数据';
  }
}
main();
</script>
