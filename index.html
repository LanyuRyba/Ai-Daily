<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HOT 日报 · 每日 AI 资讯</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.12);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.2);
    --card-bg: rgba(255,255,255,0.18);
    --card-border: rgba(255,255,255,0.3);
    --text-main: #1a1a2e;
    --text-sub: rgba(255,255,255,0.75);
    --text-card: #1e293b;
    --text-card-sub: #64748b;
    --chip-bg: rgba(255,255,255,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    /* 不在 body 上设置背景，改为固定层，避免内容高度变化时出现视觉跳变 */
    background: transparent;
  }
  /* 固定背景层：完全独立于内容滚动和高度变化 */
  #sky-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    transition: background 2s ease;
    background: #0a0a2e;
  }
  .stars { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  body.night .stars { display: block; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }
  .moon { display: none; position: fixed; z-index: 0; pointer-events: none; }
  body.night .moon { display: block; }
  .moon svg { width: 70px; height: 70px; overflow: visible; }
  .clouds { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 180px; pointer-events: none; z-index: 0; overflow: hidden; }
  body.day .clouds { display: block; }
  .cloud-cluster {
    position: absolute;
    animation: cloudDrift linear infinite;
    opacity: 0.85;
  }
  .cloud-bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95), rgba(240,245,250,0.75) 60%, rgba(220,230,240,0.5));
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }
  @keyframes cloudDrift {
    from { transform: translateX(-300px); }
    to { transform: translateX(calc(100vw + 300px)); }
  }
  .container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto; padding: 24px 16px 80px;
  }
  .hero { text-align: center; padding: 48px 20px 36px; color: white; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 30px;
    padding: 6px 16px; font-size: 13px; color: rgba(255,255,255,0.9);
    margin-bottom: 20px; letter-spacing: 0.5px;
  }
  .hero h1 {
    font-size: clamp(28px, 6vw, 48px); font-weight: 700; color: white;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2); line-height: 1.2; margin-bottom: 8px;
  }
  .hero-date { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 28px; }
  .hero-greeting {
    font-size: 17px; color: rgba(255,255,255,0.9); margin-bottom: 32px;
    line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto;
  }
  .hero-stats { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
  .stat-pill {
    background: rgba(255,255,255,0.22); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.35); border-radius: 50px;
    padding: 10px 20px; display: flex; flex-direction: column;
    align-items: center; min-width: 90px;
    transition: transform 0.2s, background 0.2s;
  }
  .stat-pill:hover { transform: translateY(-2px); background: rgba(255,255,255,0.3); }
  .stat-num { font-size: 22px; font-weight: 700; color: white; line-height: 1; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 3px; white-space: nowrap; }
  .nav-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 16px 32px; }
  .nav-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 30px;
    padding: 7px 14px; font-size: 13px; color: white;
    text-decoration: none; transition: all 0.2s; cursor: pointer;
  }
  .nav-chip:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }
  .nav-chip .count-badge { background: rgba(255,255,255,0.3); border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
  .section-header { display: flex; align-items: center; gap: 10px; margin: 40px 0 18px; color: white; }
  .section-icon { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .section-title { font-size: 20px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
  .section-count { background: rgba(255,255,255,0.25); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 600; }
  .section-divider { flex: 1; height: 1px; background: rgba(255,255,255,0.2); }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
    border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.5);
    padding: 20px; box-shadow: var(--shadow);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    opacity: 0; transform: translateY(24px); will-change: transform, opacity;
  }
  .card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1); }
  .card:hover { transform: translateY(-4px) !important; box-shadow: var(--shadow-hover); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .card-num {
    flex-shrink: 0; width: 28px; height: 28px;
    background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white;
  }
  .card-source-chip {
    display: inline-flex; align-items: center; background: #f1f5f9;
    border-radius: 20px; padding: 3px 9px; font-size: 11px;
    color: #64748b; max-width: 160px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
  }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text-card); line-height: 1.5; margin-bottom: 8px; }
  .card-time { font-size: 11px; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
  .card-summary {
    font-size: 13px; color: var(--text-card-sub); line-height: 1.6; margin-bottom: 14px;
    transition: all 0.4s ease;
  }
  .card-summary.clamped {
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-summary.unclamped {
    display: block; -webkit-line-clamp: unset;
  }
  .card-footer { display: flex; justify-content: flex-end; }
  .card-link {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 500; text-decoration: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .card-link:hover { opacity: 0.9; transform: scale(1.04); }
  .card-x-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1.5px solid #667eea60;
    color: #667eea; border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .card-x-toggle:hover {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border-color: transparent;
    transform: scale(1.04);
  }
  .card.relevant { border-left: 3px solid #667eea; }
  .relevant-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #667eea20, #764ba220);
    border: 1px solid #667eea40; border-radius: 20px;
    padding: 2px 9px; font-size: 11px; color: #667eea; font-weight: 600; margin-bottom: 8px;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.2); border-top-color: white;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.7); }
  .error-state .error-icon { font-size: 38px; margin-bottom: 12px; }
  .retry-btn {
    display: inline-block; margin-top: 14px;
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 8px 20px; color: white; font-size: 13px;
    cursor: pointer; text-decoration: none;
  }
  .retry-btn:hover { background: rgba(255,255,255,0.35); }
  .footer { text-align: center; padding: 32px 16px 16px; color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.8; }
  .footer a { color: rgba(255,255,255,0.8); text-decoration: underline; }
  .empty-section { background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.3); border-radius: var(--radius); padding: 24px; text-align: center; color: rgba(255,255,255,0.5); font-size: 13px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

  /* ===== V3 新增：浏览层（无链接卡片） ===== */
  .browse-list { display: flex; flex-direction: column; gap: 8px; }
  .browse-item {
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .browse-item.visible { opacity: 1; transform: translateY(0); }
  .browse-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .browse-num {
    width: 20px; height: 20px; flex-shrink: 0;
    background: #e2e8f0; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #64748b;
  }
  .browse-section-tag { font-size: 10px; color: #94a3b8; white-space: nowrap; }
  .browse-title { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.5; margin-bottom: 2px; }
  .browse-teaser { font-size: 12px; color: #64748b; line-height: 1.5; }
  .browse-item:hover { background: rgba(255,255,255,0.95); }

  /* ===== V3 新增：存档层（折叠后用渐变遮罩，展开后用大间隔） ===== */
  .tier-3-wrapper {
    position: relative;
    transition: max-height 0.6s ease;
  }
  .tier-3-wrapper.collapsed {
    max-height: 320px;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 35%, transparent 55%);
    mask-image: linear-gradient(to bottom, black 0%, black 35%, transparent 55%);
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
  }
  .tier-3-wrapper.expanded {
    max-height: none;
    -webkit-mask-image: none;
    mask-image: none;
    overflow: visible;
  }
  .tier-3-wrapper .tier3-card {
    background: rgba(255,255,255,0.85);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    opacity: 0; transform: translateY(24px);
    will-change: transform, opacity;
    margin-bottom: 8px;
  }
  .tier-3-wrapper.expanded .tier3-card {
    margin-bottom: 680px;
  }
  .tier-3-wrapper.expanded .tier3-card:last-child {
    margin-bottom: 8px;
  }
  .tier3-card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1); }
  .tier3-card:hover { transform: translateY(-3px) !important; }
  .tier3-card .card-title { color: #1e293b; }
  .tier3-card .card-summary { color: #64748b; }
  .tier3-card .card-source-chip { background: #f1f5f9; color: #64748b; }
  .tier3-card .card-num { background: #e2e8f0; color: #94a3b8; }

  /* 展开/收起按钮 */
  .tier-3-expand-bar {
    display: flex; justify-content: center; margin: 12px 0 24px;
  }
  .tier-3-expand-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px; padding: 10px 24px; font-size: 13px;
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .tier-3-expand-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.03); }
  .tier-3-expand-btn .arrow { display: inline-block; transition: transform 0.3s; }
  .tier-3-expand-btn.expanded .arrow { transform: rotate(180deg); }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .hero { padding: 32px 16px 24px; }
    .stat-pill { min-width: 70px; padding: 8px 12px; }
    .stat-num { font-size: 18px; }
    .moon svg { width: 52px; height: 52px; }
    .moon { top: 90px !important; right: 12px !important; }
  }
</style>
</head>
<body>
<div id="sky-bg"></div>

<div class="stars" id="starsContainer"></div>

<div class="moon" id="moonEl">
  <svg id="moonSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="moonFace" cx="35%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#fffef8"/>
        <stop offset="40%" stop-color="#f5ecd7"/>
        <stop offset="75%" stop-color="#e8dcc8"/>
        <stop offset="100%" stop-color="#d4c4a8"/>
      </radialGradient>
      <radialGradient id="moonDarkGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(10,10,46,0.82)"/>
        <stop offset="60%" stop-color="rgba(15,33,62,0.88)"/>
        <stop offset="100%" stop-color="rgba(22,33,62,0.92)"/>
      </radialGradient>
      <filter id="litGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <clipPath id="litClip">
        <path id="moonLitClipPath" d=""/>
      </clipPath>
    </defs>
    <path id="moonLitPath" fill="url(#moonFace)" filter="url(#litGlow)"/>
    <g clip-path="url(#litClip)" opacity="0.35" style="pointer-events:none;">
      <ellipse cx="32" cy="38" rx="10" ry="8" fill="#c4b49a" opacity="0.6"/>
      <ellipse cx="32" cy="38" rx="7" ry="5" fill="#b0a084" opacity="0.4"/>
      <ellipse cx="58" cy="28" rx="7" ry="6" fill="#c4b49a" opacity="0.5"/>
      <ellipse cx="58" cy="28" rx="4" ry="3" fill="#b0a084" opacity="0.3"/>
      <ellipse cx="65" cy="55" rx="8" ry="7" fill="#c4b49a" opacity="0.55"/>
      <ellipse cx="65" cy="55" rx="5" ry="4" fill="#b0a084" opacity="0.35"/>
      <ellipse cx="28" cy="62" rx="5" ry="4" fill="#c4b49a" opacity="0.5"/>
      <ellipse cx="45" cy="72" rx="6" ry="5" fill="#c4b49a" opacity="0.45"/>
      <ellipse cx="72" cy="40" rx="4" ry="3.5" fill="#c4b49a" opacity="0.4"/>
      <ellipse cx="38" cy="50" rx="3" ry="2.5" fill="#c4b49a" opacity="0.35"/>
      <ellipse cx="42" cy="45" rx="18" ry="14" fill="#c8b89e" opacity="0.15"/>
      <ellipse cx="60" cy="58" rx="14" ry="10" fill="#c8b89e" opacity="0.12"/>
    </g>
  </svg>
</div>

<div class="clouds" id="cloudsContainer"></div>

<div class="container">
  <div class="hero">
    <div class="hero-badge">
      <span id="timeIcon">☀️</span>
      <span id="timePeriodLabel">加载中...</span>
      &nbsp;·&nbsp; AI HOT 日报
    </div>
    <h1>今日 AI 资讯速览</h1>
    <div class="hero-date" id="heroDate">—</div>
    <div class="hero-greeting" id="heroGreeting"><span class="loading-spinner"></span><br>正在获取今日 AI 日报...</div>
    <div class="hero-stats" id="heroStats">
      <div class="stat-pill">
        <span class="stat-num" id="count-total">—</span>
        <span class="stat-label">📊 总条数</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-model">0</span>
        <span class="stat-label">🤖 模型更新</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-product">0</span>
        <span class="stat-label">📦 产品发布</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-industry">0</span>
        <span class="stat-label">🏭 行业动态</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-paper">0</span>
        <span class="stat-label">📄 论文研究</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-tip">0</span>
        <span class="stat-label">💡 技巧观点</span>
      </div>
    </div>
  </div>

  <nav class="nav-bar" id="navBar"></nav>

  <div id="contentArea"></div>

zzing.cc 中文翻译）","tier":3,"ai_relevant":false,"personalizedSummary":"Google 将计算机使用（Computer use）作为内置工具集成至 Gemini 3.5 Flash，使开发者能构建跨浏览器、移动端和桌面环境的智能体。此前该功能仅作为独立模型在 Gemini 2.5 中提供，现已原生整合至主 Flash 模型。开发者可通过 Gemini API 及 Gemini Enterprise Agent Platform 调用。安全方面，模型采用针对性对抗训练降低提示注入风险，并新增两项可选企业级保护：要求用户确认敏感操作、检测到间接提示注入时自动停止。该能力在持续软件测试、跨应用知识工作等长周期企业自动化场景中表现更优。（198字）"},{"title":"GPT-5.5 Instant 新版本，对话更有趣","summary":"我们为你带来了新版 GPT-5.5 Instant，它现在聊起天来有趣多了。 我们最常用的模型现在能更好地理解问题背后的意图，并相应地调整回应。 它也能更可靠地处理复杂约束，让购物和本地推荐更加实用和连贯。 今天向付费用户推送，明天向免费用户推送。","sourceUrl":"https://x.com/OpenAI/status/2069843083701915755","sourceName":"X：OpenAI (@OpenAI)","tier":2,"ai_relevant":false,"personalizedSummary":"GPT-5.5 Instant 更新，对话更智能有趣。对已付费用户推送。"}]},{"label":"产品发布/更新","items":[{"title":"今天，豆包正式推出专业版","summary":"豆包专业版基于豆包2.1系列大模型上线，面向复杂办公与生产力场景。办公任务模式接入可执行Agent任务的豆包2.1模型，支持操作本地电脑、浏览器、调用Skills技能、定时任务，内置Office办公套件，并可生成带后端数据库的在线应用。免费用户可体验豆包2.1 Turbo版办公任务模式，专业版接入豆包2.1 Pro模型。定价：标准套餐68元/月（连续包月），加强套餐200元/月，高级套餐500元/月。大学生认证后标准套餐38元/月，持续6个月。","sourceUrl":"https://mp.weixin.qq.com/s/Sb-NMXTrWFQES1EDO_Gr2g","sourceName":"公众号：豆包（字节）","tier":3,"ai_relevant":false,"personalizedSummary":"豆包专业版基于豆包2.1系列大模型上线，面向复杂办公与生产力场景。办公任务模式接入可执行Agent任务的豆包2.1模型，支持操作本地电脑、浏览器、调用Skills技能、定时任务，内置Office办公套件，并可生成带后端数据库的在线应用。免费用户可体验豆包2.1 Turbo版办公任务模式，专业版接入豆包2.1 Pro模型。定价：标准套餐68元/月（连续包月），加强套餐200元/月，高级套餐500元/月。大学生认证后标准套餐38元/月，持续6个月。"},{"title":"Figma在Config 2026押注人类判断，画布AI能力却来自第三方","summary":"Figma在Config 2026将设计画布扩展至代码、动画、3D深度和着色器效果，并集成去年收购的Weave工作流系统。新功能包括Code Layers（代码与设计并存）、Motion动画、深度层、Shader及Generative Plugins。协作方面，团队可搜索复用AI提示词、保存工作流为技能、共享插件。Figma的AI功能依赖Anthropic、OpenAI和Google等外部模型，推理成本挤压利润率。同时，Anthropic等公司的竞争产品可直接生成界面，构成威胁。","sourceUrl":"https://the-decoder.com/figma-bets-on-human-judgment-at-config-2026-while-the-ai-powering-its-canvas-belongs-to-someone-else","sourceName":"The Decoder：AI News（RSS）","tier":3,"ai_relevant":false,"personalizedSummary":"Figma在Config 2026将设计画布扩展至代码、动画、3D深度和着色器效果，并集成去年收购的Weave工作流系统。新功能包括Code Layers（代码与设计并存）、 ,{"title":"OpenAI 与 Broadcom 发布面向 LLM 推理的定制芯片 Jalapeño","summary":"OpenAI 与 Broadcom 联合推出 Jalapeño，一款专为大语言模型（LLM）推理优化的定制 AI 芯片，旨在提升 AI 系统的性能、效率与规模。","sourceUrl":"https://openai.com/index/openai-broadcom-jalapeno-inference-chip","sourceName":"OpenAI：官网动态（RSS · 排除企业/客户案例）","tier":3,"ai_relevant":false,"personalizedSummary":"OpenAI 与 Broadcom 联合推出 Jalapeño，一款专为大语言模型（LLM）推理优化的定制 AI 芯片，旨在提升 AI 系统的性能、效率与规模。"}]},{"label":"行业动态","items":[{"title":"在与Anthropic的纠纷中，NSA失去了对Mythos的访问权限","summary":"美国国家安全局（NSA）因与人工智能公司Anthropic的纠纷，失去了对Mythos系统的访问权限。","sourceUrl":"https://www.nytimes.com/2026/06/23/us/politics/nsa-lost-access-anthropic-tool.html","sourceName":"Hacker News 热门（buzzing.cc 中文翻译）","tier":3,"ai_relevant":false,"personalizedSummary":"美国国家安全局（NSA）因与人工智能公司Anthropic的纠纷，失去了对Mythos系统的访问权限。"}]},{"label":"论文研究","items":[{"title":"DFlash：块扩散草稿模型实现最高15倍吞吐量提升","summary":"DFlash 由 UC San Diego 团队提出，是一种用于投机解码的轻量块扩散草稿模型。它一次前向推理生成整块 token，再由目标模型并行验证，保证输出无损。相比 EAGLE-3，DFlash 实现最高 2.5 倍加速，在 Qwen3-8B 等多种模型上平均无损加速超过 6 倍（MATH-500 达 6.08×）。在 NVIDIA Blackwell 上（TensorRT-LLM），gpt-oss-120b 模型吞吐量提升最高 15 倍，约为 EAGLE-3 的 1.5 倍。核心创新是将目标模型多层隐藏特征注入草稿模型每一层的 Key-Value 投影，使接受长度随草稿深度增长。","sourceUrl":"https://www.marktechpost.com/2026/06/24/dflash-speculative-decoding-drafts-whole-token-blocks-in-parallel-for-up-to-15x-higher-throughput-on-nvidia-blackwell","sourceName":"MarkTechPost（RSS）","tier":3,"ai_relevant":false,"personalizedSummary":"DFlash 由 UC San Diego 团队提出，是一种用于投机解码的轻量块扩散草稿模型。它一次前向推理生成整块 token，再由目标模型并行验证，保证输出无损。相比 EAGLE-3，DFlash 实现最高 2.5 倍加速，在 Qwen3-8B 等多种模型上平均无损加速超过 6 倍（MATH-500 达 6.08×）。在 NVIDIA Blackwell 上（TensorRT-LLM），gpt-oss-120b 模型吞吐量提升最高 15 倍，约为 EAGLE-3 的 1.5 倍。核心创新是将目标模型多层隐藏特征注入草稿模型每一层的 Key-Value 投影，使接受长度随草稿深度增长。"},{"title":"思考即回忆：推理如何解锁LLM中的参数化知识","summary":"Google Research研究发现，推理（chain-of-thought）能帮助大语言模型（LLM）回忆简单事实，即使这些事实无需复杂推导。在Gemini-2.5 Flash和Pro以及Qwen3-32B上，启用推理后模型能够回答原本无法直接回答的简单问题，pass@k显示正确事实存在于输出分布中。该现象由两个机制驱动：一是生成的推理token充当计算缓冲，允许模型进行隐藏计算以提取参数化知识；二是推理过程中产生的相关事实起到启动效应（factua // ============================================================
//  月相系统
// ============================================================
function calcMoonPhase(date) {
  const knownNewMoon = 2451550.1;
  const synodic = 29.53058867;
  const jd = date.getTime() / 86400000 + 2440587.5;
  return ((jd - knownNewMoon) % synodic) / synodic;
}
const MOON_NAMES = ['🌑 新月','🌒 蛾眉月','🌓 上弦月','🌔 盈凸月','🌕 满月','🌖 亏凸月','🌗 下弦月','🌘 残月'];
function getMoonName(phase) { return MOON_NAMES[Math.floor((phase % 1) * 8) % 8]; }
function setMoonPhase(phase) {
  const litPath = document.getElementById('moonLitPath');
  const clipPath = document.getElementById('moonLitClipPath');
  if (!litPath) return;
  const p = phase % 1, cx = 50, cy = 50, r = 46;
  let d = '';
  if (p < 0.002 || p > 0.998) { d = ''; }
  else if (Math.abs(p - 0.5) < 0.002) { d = 'M '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 1 1 '+cx+' '+(cy+r)+' A '+r+' '+r+' 0 1 1 '+cx+' '+(cy-r)+' Z'; }
  else {
    const cosPhase = Math.cos(2 * Math.PI * p);
    const minor = Math.abs(cosPhase) * r;
    const waxing = p < 0.5;
    const outerSweep = waxing ? 1 : 0;
    const innerSweep = cosPhase < 0 ? 1 : 0;
    d = 'M '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 0 '+outerSweep+' '+cx+' '+(cy+r)+' A '+minor.toFixed(2)+' '+r+' 0 0 '+innerSweep+' '+cx+' '+(cy-r)+' Z';
  }
  litPath.setAttribute('d', d);
  if (clipPath) clipPath.setAttribute('d', d);
  const moonEl = document.getElementById('moonEl');
  const angle = p * Math.PI * 0.4 - 0.15;
  moonEl.style.top = (55 + Math.sin(angle) * 25) + 'px';
  moonEl.style.right = (35 + Math.cos(angle) * 20) + 'px';
}

// ============================================================
//  北京时间工具
// ============================================================
function getBJ() {
  const now = new Date();
  const bj = new Date(now.getTime() + 8 * 3600000);
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  return {
    now, bj,
    y: bj.getUTCFullYear(), m: bj.getUTCMonth()+1, d: bj.getUTCDate(),
    h: bj.getUTCHours(), min: bj.getUTCMinutes(),
    wd: weekdays[bj.getUTCDay()],
    isoDate: bj.getUTCFullYear()+'-'+String(bj.getUTCMonth()+1).padStart(2,'0')+'-'+String(bj.getUTCDate()).padStart(2,'0')
  };
}

// ============================================================
//  太阳位置计算
// ============================================================
const MY_LAT = 23.08, MY_LNG = 114.42;
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function calcSolarElevation(lat, lng, date) {
  const jd = date.getTime() / 86400000 + 2440587.5;
  const n = jd - 2451545.0;
  const L = (280.460 + 0.9856474 * n) % 360;
  const g = (357.528 + 0.9856003 * n) % 360;
  const lambda = L + 1.915 * Math.sin(toRad(g)) + 0.020 * Math.sin(toRad(2 * g));
  const epsilon = 23.439 - 0.0000004 * n;
  const decl = toDeg(Math.asin(Math.sin(toRad(epsilon)) * Math.sin(toRad(lambda))));
  const gmst = (280.46061837 + 360.98564736629 * n) % 360;
  const lst = (gmst + lng) % 360;
  const ha = ((lst - lambda) + 180) % 360 - 180;
  return toDeg(Math.asin(Math.sin(toRad(lat)) * Math.sin(toRad(decl)) + Math.cos(toRad(lat)) * Math.cos(toRad(decl)) * Math.cos(toRad(ha))));
}
function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  return '#'+((1<<24)+(Math.round((ah>>16)+((bh>>16)-(ah>>16))*t)<<16)+(Math.round(((ah>>8)&0xff)+(((bh>>8)&0xff)-((ah>>8)&0xff))*t)<<8)+Math.round((ah&0xff)+((bh&0xff)-(ah&0xff))*t)).toString(16).slice(1);
}
function computeSkyGradient(elev, wcode) {
  let top, mid, bottom;
  if (elev < -15) { top='#0a0a2e'; mid='#0a0a2e'; bottom='#0a0a2e'; }
  else if (elev < -7) { const t=(elev+15)/8; top=lerpColor('#0a0a2e','#12103e',t); mid=lerpColor('#0a0a2e','#1a1a4e',t); bottom=lerpColor('#0a0a2e','#2a2060',t); }
  else if (elev < -2) { const t=(elev+7)/5; top=lerpColor('#12103e','#1a1a5e',t); mid=lerpColor('#1a1a4e','#2a3a7e',t); bottom=lerpColor('#2a2060','#4a5a9e',t); }
  else if (elev < 3) { const t=(elev+2)/5; top=lerpColor('#1a1a5e','#3a206a',t); mid=lerpColor('#2a3a7e','#c85a3e',t); bottom=lerpColor('#d46a3e','#f4a261',t); }
  else if (elev < 10) { const t=(elev-3)/7; top=lerpColor('#3a206a','#8ab8e8',t); mid=lerpColor('#c85a3e','#b0d8f0',t); bottom=lerpColor('#f4a261','#eef6fe',t); }
  else if (elev < 30) { const t=(elev-10)/20; top=lerpColor('#8ab8e8','#a0c8f0',t); mid=lerpColor('#b0d8f0','#cce0f5',t); bottom=lerpColor('#d0e8f5','#eef6fe',t); }
  else { top='#8ab8e8'; mid='#c0ddf5'; bottom='#eef6fe'; }
  if (wcode !== null && wcode !== undefined) {
    let dull = 0;
    if (wcode >= 3 && wcode <= 4) dull = 0.25;
    else if (wcode >= 5) dull = 0.35;
    if (dull > 0) { top=lerpColor(top,'#8a8a9a',dull); mid=lerpColor(mid,'#8a8a9a',dull); bottom=lerpColor(bottom,'#8a8a9a',dull); }
  }
  return 'linear-gradient(160deg, '+top+' 0%, '+mid+' 35%, '+bottom+' 100%)';
}
function getGreeting(h) {
  if (h >= 5 && h < 9) return { icon:'🌅', label:'早安' };
  if (h >= 9 && h < 12) return { icon:'☀️', label:'上午好' };
  if (h >= 12 && h < 14) return { icon:'🌤️', label:'午好' };
  if (h >= 14 && h < 17) return { icon:'🌞', label:'下午好' };
  if (h >= 17 && h < 19) return { icon:'🌇', label:'傍晚好' };
  if (h >= 19 && h < 23) return { icon:'🌆', label:'晚上好' };
  return { icon:'🌙', label:'深夜好' };
}
let _cachedWCode = null;
function updateSky() {
  const now = new Date();
  const elev = calcSolarElevation(MY_LAT, MY_LNG, now);
  document.body.className = elev < -2 ? 'night' : 'day';
  var skyBg = document.getElementById('sky-bg');
  if (skyBg) skyBg.style.background = computeSkyGradient(elev, _cachedWCode);
  const bj = getBJ();
  const g = getGreeting(bj.h);
  document.getElementById('timeIcon').textContent = g.icon;
  document.getElementById('timePeriodLabel').textContent = g.label;
}
async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+MY_LAT+'&longitude='+MY_LNG+'&current_weather=true',{signal:AbortSignal.timeout(5000)});
    if (!r.ok) return;
    const data = await r.json();
    if (data && data.current_weather) { _cachedWCode=data.current_weather.weathercode; updateSky(); }
  } catch(e) {}
}

function humanTime(iso) {
  if (!iso) return null;
  const t=new Date(iso); if(isNaN(t.getTime())) return null;
  const bj=new Date(t.getTime()+8*3600000), nowBJ=new Date(new Date().getTime()+8*3600000);
  const diffMin=Math.floor((nowBJ-bj)/60000), diffHr=Math.floor(diffMin/60);
  const h=bj.getUTCHours(), m=bj.getUTCMinutes();
  const pad=n=>String(n).padStart(2,'0'), hm=pad(h)+':'+pad(m);
  const p=h<6?'凌晨':h<9?'早上':h<12?'上午':h<13?'中午':h<18?'下午':h<20?'傍晚':'晚上';
  if(diffMin<5) return '刚刚';
  if(diffMin<60) return diffMin+'分钟前';
  if(diffHr<24&&bj.getUTCDate()===nowBJ.getUTCDate()) return '今天'+p+' '+hm;
  if(diffHr<48) return '昨天'+p+' '+hm;
  return (bj.getUTCMonth()+1)+'/'+bj.getUTCDate()+' '+hm;
}
function shortSrc(s) { return (s||'').replace(/\(@\w+\)/g,'').replace(/（RSS）/g,'').trim()||'未知'; }
function isXLink(url) { if(!url)return false; const u=url.toLowerCase(); return u.includes('x.com')||u.includes('twitter.com'); }

// X 来源卡片展开/收起
function toggleXCard(btn) {
  var card = btn.closest('.card');
  if (!card) return;
  var summary = card.querySelector('.card-summary');
  if (!summary) return;
  var isClamped = summary.classList.contains('clamped');
  if (isClamped) {
    summary.classList.remove('clamped');
    summary.classList.add('unclamped');
    btn.innerHTML = '收起 ↑';
  } else {
    summary.classList.add('clamped');
    summary.classList.remove('unclamped');
    btn.innerHTML = '展开全文 ↓';
  }
}

// ============================================================
//  三层渲染引擎
// ============================================================
const SECTION_ICONS = {'模型发布/更新':'🤖','产品发布/更新':'📦','行业动态':'🏭','论文研究':'📄','技巧与观点':'💡'};
const NAV_IDS = {'模型发布/更新':'model','产品发布/更新':'product','行业动态':'industry','论文研究':'paper','技巧与观点':'tip'};
const COUNTS_ORDER = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];

function render(data) {
  var sections = data.sections;
  if (!sections || sections.length === 0) {
    document.getElementById('contentArea').innerHTML = '<div class="error-state"><div class="error-icon">📭</div><p>今日暂无 AI 日报数据</p></div>';
    document.getElementById('heroGreeting').innerHTML = '今天还没有更新的 AI 日报，晚点再来看看吧';
    return;
  }

  var bj = getBJ();
  var counts = {}, total = 0;
  sections.forEach(function(s) { counts[s.label] = (s.items||[]).length; total += counts[s.label]; });
  document.getElementById('heroDate').textContent = bj.y+'年'+bj.m+'月'+bj.d+'日（'+bj.wd+'）';
  document.getElementById('count-total').textContent = total;
  COUNTS_ORDER.forEach(function(k) {
    var el = document.getElementById('count-'+(NAV_IDS[k]||'other'));
    if (el) el.textContent = counts[k]||0;
  });
  setMoonPhase(calcMoonPhase(new Date()));
  var pname = getMoonName(calcMoonPhase(new Date()));

  // 收集所有 items
  var allItems = [];
  sections.forEach(function(s) {
    (s.items||[]).forEach(function(it) {
      allItems.push({
        title: it.title,
        summary: it.summary,
        sourceUrl: it.sourceUrl,
        sourceName: it.sourceName,
        publishedAt: it.publishedAt,
        sectionLabel: s.label,
        tier: it.tier||3,
        ai_relevant: it.ai_relevant||false,
        personalizedSummary: it.personalizedSummary||''
      });
    });
  });

  var tier1 = allItems.filter(function(it) { return it.tier === 1; });
  var tier2 = allItems.filter(function(it) { return it.tier === 2; });
  var tier3 = allItems.filter(function(it) { return it.tier === 3; });

  document.getElementById('heroGreeting').innerHTML =
    '今天 <strong style="color:#fff">'+total+'</strong> 条 AI 精选资讯<br>'+
    '为你筛选出 <strong style="color:#f5a623">'+tier1.length+'</strong> 条必读 · '+
    '<span style="color:rgba(255,255,255,0.5)">'+tier2.length+'</span> 条浏览 · '+
    '<span style="color:rgba(255,255,255,0.3)">'+tier3.length+'</span> 条存档<br>'+
    '<span style="font-size:13px;color:rgba(255,255,255,0.6)">今晚月相：'+pname+' · 三层注意力保护设计</span>';

  // 导航
  var navBar = document.getElementById('navBar');
  var chips = [];
  if (tier1.length > 0) chips.push('<a href="#tier1" class="nav-chip" style="background:rgba(245,166,35,0.25);border-color:rgba(245,166,35,0.4)">🔥 必读 <span class="count-badge" style="background:rgba(245,166,35,0.4)">'+tier1.length+'</span></a>');
  COUNTS_ORDER.forEach(function(k) {
    if (k in counts) chips.push('<a href="#section-'+NAV_IDS[k]+'" class="nav-chip">'+SECTION_ICONS[k]+' '+k+' <span class="count-badge">'+counts[k]+'</span></a>');
  });
  navBar.innerHTML = chips.join('');

  var content = document.getElementById('contentArea');
  var html = '';

  // ===== 第一级：必读层 =====
  if (tier1.length > 0) {
    html += '<section id="tier1"><div class="section-header"><span class="section-icon">🔥</span><span class="section-title">对你最有用 · 今日必读</span><span class="section-count">'+tier1.length+'条</span><div class="section-divider"></div></div><div class="cards-grid">';
    tier1.forEach(function(it, i) {
      var sectionIcon = SECTION_ICONS[it.sectionLabel]||'📌';
      var isX = isXLink(it.sourceUrl);
      // 所有摘要默认 clamp 到 3 行，X 来源可展开详读
      var summaryCls = 'card-summary clamped';
      var footerLeft = '来自 '+shortSrc(it.sourceName||it.source);
      var footerRight;
      if (isX) {
        // X 来源：替代"阅读原文"为"展开全文"按钮，在卡片内展示完整摘要
        footerLeft += ' <span style="color:#e74c3c;font-size:10px">✕ 来源 · 摘要可展开</span>';
        footerRight = '<button class="card-x-toggle" data-x-toggle onclick="toggleXCard(this)">展开全文 ↓</button>';
      } else {
        footerRight = '<a class="card-link" href="'+(it.sourceUrl||'#')+'" target="_blank" rel="noopener noreferrer">阅读原文 →</a>';
      }
      html += '<div class="card relevant" data-animate><div class="card-top"><div class="card-num" style="background:linear-gradient(135deg,#f5a623,#e07b1a)">'+(i+1)+'</div><span class="card-source-chip">'+sectionIcon+' '+it.sectionLabel+'</span></div><div class="card-title">'+(it.title||'无标题')+'</div><div class="' + summaryCls + '" style="color:#2d3748">' + (it.personalizedSummary||it.summary||'暂无摘要') + '</div><div class="card-footer" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:#94a3b8">' + footerLeft + '</span>' + footerRight + '</div></div>';
    });
    html += '</div></section>';
  } else {
    html += '<section><div class="section-header"><span class="section-icon">🔥</span><span class="section-title">今日必读</span><div class="section-divider"></div></div><div class="empty-section">今天没有与你的业务直接相关的资讯，去看看其他板块吧</div></section>';
  }

  // ===== 第二级：浏览层 =====
  if (tier2.length > 0) {
    html += '<section><div class="section-header"><span class="section-icon">📋</span><span class="section-title">领域快讯 · 快速浏览</span><span class="section-count">'+tier2.length+'条</span><div class="section-divider"></div></div><div class="browse-list">';
    var browseIdx = tier1.length;
    tier2.forEach(function(it) {
      browseIdx++;
      var sectionIcon = SECTION_ICONS[it.sectionLabel]||'📌';
      var teaser = (it.personalizedSummary||it.summary||'暂无摘要').replace(/https?:\/\/\S+/g,'').trim();
      if (teaser.length > 60) teaser = teaser.substring(0, 60) + '…';
      html += '<div class="browse-item" data-animate><div class="browse-item-top"><span class="browse-num">'+browseIdx+'</span><span class="browse-section-tag">'+sectionIcon+' '+it.sectionLabel+'</span></div><div class="browse-title">'+it.title+'</div><div class="browse-teaser">'+teaser+'</div></div>';
    });
    html += '</div><p style="text-align:center;font-size:11px;color:rgba(255,255,255,0.3);margin-top:8px;">想深入了解？浏览器搜索标题即可 · 有意识地增加搜索成本，帮你聚焦真正重要的事</p></section>';
  }

  // ===== 第三级：存档层 =====
  if (tier3.length > 0) {
    html += '<section>';
    // 哨兵元素：固定在标题区顶部，用于 IntersectionObserver 感知用户是否滚回来了
    html += '<div id="tier3Sentinel" style="height:1px;"></div>';
    html += '<div class="section-header"><span class="section-icon">🌐</span><span class="section-title">行业全景</span><span class="section-count">'+tier3.length+'条</span><div class="section-divider"></div></div>';
    html += '<div class="tier-3-wrapper collapsed" id="tier3Wrapper"><div class="cards-grid">';
    var t3idx = tier1.length + tier2.length;
    tier3.forEach(function(it, i) {
      t3idx++;
      html += '<div class="tier3-card" data-animate><div class="card-top"><div class="card-num" style="background:#e2e8f0;color:#94a3b8">'+t3idx+'</div><span class="card-source-chip">'+shortSrc(it.sourceName||it.source)+'</span></div><div class="card-title">'+(it.title||'无标题')+'</div><div class="card-summary">'+((it.summary||'暂无摘要').replace(/https?:\/\/\S+/g,'').trim())+'</div></div>';
    });
    html += '</div></div>'; // close cards-grid and tier-3-wrapper

    // 展开按钮在外部
    html += '<div class="tier-3-expand-bar"><button class="tier-3-expand-btn" id="tier3ExpandBtn" onclick="toggleTier3()"><span class="arrow">↓</span> 展开剩余 '+(tier3.length)+' 条</button></div>';
    html += '</section>';
  }

  content.innerHTML = html;

  // 页脚
  document.getElementById('footer').innerHTML = '<p>今日共收录 <strong style="color:rgba(255,255,255,0.9)">'+total+'</strong> 条 AI 精选资讯 · 三层注意力保护设计</p><p style="margin-top:6px">🔥 必读层 '+tier1.length+'条 · 📋 浏览层 '+tier2.length+'条 · 🌐 存档层 '+tier3.length+'条 · '+bj.y+'年'+bj.m+'月'+bj.d+'日</p>';

  // 滚入动画
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry, i) {
      if (entry.isIntersecting) {
        setTimeout(function() { entry.target.classList.add('visible'); }, i * 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('[data-animate]').forEach(function(el) { observer.observe(el); });

  // 锚点平滑滚动
  document.querySelectorAll('a[href^="#"]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var t = document.querySelector(a.getAttribute('href'));
      if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

// ============================================================
//  三级展开/折叠 + 滚回自动收起
// ============================================================
var tier3AutoCollapseObserver = null;

function collapseTier3() {
  var wrapper = document.getElementById('tier3Wrapper');
  var btn = document.getElementById('tier3ExpandBtn');
  if (!wrapper || !btn) return;
  if (!wrapper.classList.contains('expanded')) return;
  wrapper.classList.add('collapsed');
  wrapper.classList.remove('expanded');
  btn.classList.remove('expanded');
  var count = wrapper.querySelectorAll('.tier3-card').length;
  btn.innerHTML = '<span class="arrow">↓</span> 展开剩余 '+count+' 条';
  // 停止监听
  if (tier3AutoCollapseObserver) {
    tier3AutoCollapseObserver.disconnect();
    tier3AutoCollapseObserver = null;
  }
}

function toggleTier3() {
  var wrapper = document.getElementById('tier3Wrapper');
  var btn = document.getElementById('tier3ExpandBtn');
  if (!wrapper || !btn) return;
  var isCollapsed = wrapper.classList.contains('collapsed');
  if (isCollapsed) {
    // 展开
    wrapper.classList.remove('collapsed');
    wrapper.classList.add('expanded');
    btn.classList.add('expanded');
    btn.innerHTML = '<span class="arrow">↓</span> 重新折叠';
    // 启动 IntersectionObserver：监听触发哨兵元素（行业全景标题区上方）
    // 当哨兵重新进入视口（用户滚回来），自动折叠
    var sentinel = document.getElementById('tier3Sentinel');
    if (sentinel && 'IntersectionObserver' in window) {
      // 先断开旧的
      if (tier3AutoCollapseObserver) tier3AutoCollapseObserver.disconnect();
      // 延迟 800ms 再启动监听，避免刚展开就触发折叠
      setTimeout(function() {
        tier3AutoCollapseObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            // 哨兵重新出现在视口中（用户向上滚回来了）
            if (entry.isIntersecting) {
              collapseTier3();
            }
          });
        }, {
          root: null,
          // 只在哨兵从下方消失后再回到视口时触发（顶部 0px 边界）
          rootMargin: '0px 0px -80% 0px',
          threshold: 0
        });
        tier3AutoCollapseObserver.observe(sentinel);
      }, 800);
    }
  } else {
    collapseTier3();
  }
}

// ============================================================
function main() {
  updateSky();
  fetchWeather();
  setInterval(updateSky, 180000);
  setInterval(function() { fetchWeather(); }, 1800000);
  setMoonPhase(calcMoonPhase(new Date()));

  try {
    var el = document.getElementById('embeddedData');
    var data = null;
    if (el && el.textContent) {
      data = JSON.parse(el.textContent);
    }
    if (!data || !data.sections || data.sections.length === 0) throw new Error('无数据');
    render(data);
  } catch (err) {
    document.getElementById('contentArea').innerHTML = '<div class="error-state"><div class="error-icon">😅</div><p>数据加载失败</p><p style="font-size:12px;margin-top:8px;color:rgba(255,255,255,0.5)">'+err.message+'</p><a class="retry-btn" onclick="location.reload()">重新加载</a></div>';
    document.getElementById('heroGreeting').innerHTML = '暂时无法获取日报数据';
  }
}
main();
